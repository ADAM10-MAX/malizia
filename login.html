<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Malizia — Sign in</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:24px;">
      <a href="index.html" class="logo">MALI<span>ZIA</span></a>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="customer">Customer</button>
      <button class="auth-tab" data-tab="admin">Admin</button>
    </div>

    <div id="notice" class="notice"></div>

    <!-- CUSTOMER TAB -->
    <div id="tab-customer">
      <button id="google-btn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.6 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.2 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.2 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.3 0 10.1-2 13.7-5.4l-6.3-5.2C29.4 35.4 26.8 36 24 36c-5.3 0-9.8-3.4-11.4-8.1l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 3-3.1 5.5-5.9 7.1l6.3 5.2C39.8 37.2 44 31.2 44 24c0-1.3-.1-2.4-.4-3.5z"/></svg>
        متابعة عبر Google
      </button>

      <button id="facebook-btn" class="google-btn" style="margin-top:10px;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        متابعة عبر Facebook
      </button>

      <div class="divider">أو</div>

      <form id="customer-password-form">
        <div class="field">
          <label for="c-email">Email</label>
          <input type="email" id="c-email" placeholder="you@email.com" required />
        </div>
        <div class="field">
          <label for="c-password">Password</label>
          <input type="password" id="c-password" placeholder="••••••••" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-block" id="customer-submit-btn">Sign in</button>
      </form>

      <div style="text-align:center; margin-top:18px; display:flex; justify-content:space-between;">
        <a href="#" id="toggle-mode-link" class="link-muted">ليس لديك حساب؟ أنشئ واحدا</a>
        <a href="#" id="forgot-password-link" class="link-muted">Forgot password?</a>
      </div>
    </div>
    <!-- ADMIN TAB -->
    <div id="tab-admin" style="display:none;">
      <p class="field-hint" style="margin-bottom:18px;">
        وصول محجوز لفريق Malizia. سجل الدخول بحساب المسؤول الخاص بك.
      </p>
      <form id="admin-login-form">
        <div class="field">
          <label for="a-email">Admin email</label>
          <input type="email" id="a-email" placeholder="admin@malizia.com" required />
        </div>
        <div class="field">
          <label for="a-password">Password</label>
          <input type="password" id="a-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-brass btn-block">Enter dashboard</button>
      </form>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="login.js"></script>
</body>
</html>
