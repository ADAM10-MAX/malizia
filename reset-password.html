<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Malizia — Reset password</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:24px;">
      <a href="index.html" class="logo">MALI<span>ZIA</span></a>
    </div>
    <h3 style="margin-bottom:8px;">إعادة تعيين كلمة السر</h3>
    <p class="field-hint" style="margin-bottom:22px;">اختر كلمة سر جديدة لحسابك.</p>
    <div id="notice" class="notice"></div>
    <form id="reset-form">
      <div class="field">
        <label for="new-password">New password</label>
        <input type="password" id="new-password" minlength="6" placeholder="••••••••" required />
      </div>
      <div class="field">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" minlength="6" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-block">Update password</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
  function showNotice(msg, isError = false) {
    const n = document.getElementById("notice");
    n.textContent = msg;
    n.className = "notice show" + (isError ? " error" : "");
  }

  // Supabase places the recovery token in the URL hash; supabase-js
  // picks it up automatically and creates a temporary session for us.
  document.getElementById("reset-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const pass = document.getElementById("new-password").value;
    const confirm = document.getElementById("confirm-password").value;

    if (pass !== confirm) {
      showNotice("كلمتا السر غير متطابقتين.", true);
      return;
    }
    if (isDemoMode()) {
      showNotice("Supabase غير مُهيّأ بعد — هذا نموذج توضيحي فقط.", true);
      return;
    }

    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) {
      showNotice(error.message, true);
      return;
    }
    showNotice("تم تحديث كلمة السر. يمكنك الآن تسجيل الدخول.");
    setTimeout(() => (window.location.href = "login.html"), 1200);
  });
</script>
</body>
</html>
