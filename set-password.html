<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Malizia — Set your password</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:24px;">
      <a href="index.html" class="logo">MALI<span>ZIA</span></a>
    </div>
    <h3 style="margin-bottom:8px;">أنشئ كلمة سر</h3>
    <p class="field-hint" style="margin-bottom:22px;">
      سجلت دخولك عبر Google بنجاح. لتتمكن من الدخول لاحقا بكلمة سر أيضا، اختر واحدة الآن (اختياري).
    </p>
    <div id="notice" class="notice"></div>
    <form id="set-password-form">
      <div class="field">
        <label for="new-password">New password</label>
        <input type="password" id="new-password" minlength="6" placeholder="••••••••" required />
      </div>
      <div class="field">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" minlength="6" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-block">Save password</button>
    </form>
    <div style="text-align:center; margin-top:16px;">
      <a href="index.html" class="link-muted">تخطي، متابعة للمتجر</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
  function showNotice(msg, isError = false) {
    const n = document.getElementById("notice");
    n.textContent = msg;
    n.className = "notice show" + (isError ? " error" : "");
  }

  document.getElementById("set-password-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const pass = document.getElementById("new-password").value;
    const confirm = document.getElementById("confirm-password").value;

    if (pass !== confirm) {
      showNotice("كلمتا السر غير متطابقتين.", true);
      return;
    }
    if (isDemoMode()) {
      showNotice("Supabase غير مُهيّأ بعد — هذا نموذج توضيحي فقط.", true);
      return;
    }

    // Update the password on the Supabase Auth user directly.
    const { data: userData } = await sb.auth.getUser();
    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) {
      showNotice(error.message, true);
      return;
    }

    // Mirror it in customers_passwords for the app's own records (optional).
    if (userData?.user?.id) {
      await sb.from("customers_passwords").upsert({
        id: userData.user.id,
        custom_password: "set", // never store real plaintext passwords yourself —
        // Supabase Auth already hashes and stores the real one securely.
        updated_at: new Date().toISOString(),
      });
    }

    showNotice("تم حفظ كلمة السر بنجاح.");
    setTimeout(() => (window.location.href = "index.html"), 1200);
  });
</script>
</body>
</html>
